<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }} - {{ site.description }}{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

  <header class="site-header">
    <div class="container">
      <div class="site-branding">
        <h1 class="site-title">
          <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
        </h1>
        <p class="site-description">{{ site.description }}</p>
      </div>
      <nav>
        <ul class="site-nav">
          <li class="{% if page.url == '/' %}active{% endif %}">
            <a href="{{ '/' | relative_url }}">Blog</a>
          </li>
          <li class="{% if page.url contains '/about/' and page.url != '/about/projects/' %}active{% endif %}">
            <a href="{{ '/about/' | relative_url }}">About Bill</a>
          </li>
          <li class="{% if page.url contains '/about/projects/' %}active{% endif %}">
            <a href="{{ '/about/projects/' | relative_url }}">Projects</a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="main-content">
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; {{ 'now' | date: '%Y' }} {{ site.title }}. All rights reserved.</p>
      <p>Powered by <a href="https://jekyllrb.com/" target="_blank">Jekyll</a> &amp; <a href="https://pages.github.com/" target="_blank">GitHub Pages</a>.</p>
    </div>
  </footer>

</body>
</html>
